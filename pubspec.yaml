name: yt_ecommerce_admin_panel
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  cached_network_image: ^3.4.1
  clipboard: ^0.1.3
  cloud_firestore: ^5.6.7
  connectivity_plus: ^6.1.4
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  data_table_2: ^2.6.0
  firebase_auth: ^5.5.3
  firebase_core: ^3.13.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dropzone: ^4.2.1
  flutter_native_splash: ^2.4.6
  flutter_typeahead: ^5.2.0
  get_it: ^8.0.3
  html: ^0.15.6
  http: ^1.4.0
  iconsax: ^0.0.8
  image_picker: ^1.1.2
  intl: ^0.20.2
  lottie: ^3.3.2
  multi_select_flutter: ^4.1.3
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  supabase_flutter: ^2.12.0
  smooth_page_indicator: ^1.2.1
  universal_html: ^2.2.4
  url_launcher: ^6.3.1
  url_strategy: ^0.2.0
  web: ^1.1.1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  #--------------- LOCAL ASSETS ------------------#
  assets:
    - .env
    - assets/logos/
    - assets/images/content/
    - assets/images/animations/
    - assets/icons/payment_methods/

  #--------------- LOCAL FONTS ------------------#
  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/urbanist/Urbanist-Light.ttf
          weight: 300
        - asset: assets/fonts/urbanist/Urbanist-Regular.ttf
          weight: 400
        - asset: assets/fonts/urbanist/Urbanist-Italic.ttf
          style: italic
        - asset: assets/fonts/urbanist/Urbanist-Medium.ttf
          weight: 500
        - asset: assets/fonts/urbanist/Urbanist-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/urbanist/Urbanist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/urbanist/Urbanist-Bold.ttf
          weight: 800
